<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BaresTKD Curriculum</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0d0d0d;
    --white: #ffffff;
    --off-white: #f8f6f0;
    --gold: #c9920a;
    --gold-light: #f5d97a;
    --gold-bg: #fffbf0;
    --gray: #444;
    --gray-light: #888;
    --border: #e8e0cc;
    --red: #c8102e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--off-white); color: var(--black); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  /* HEADER */
  header {
    background: var(--black);
    padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    border-bottom: 3px solid var(--gold);
    min-height: 64px;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 3px; color: var(--white); line-height: 1; }
  .logo span { color: var(--gold); }
  .header-sub { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 2px; }

  /* SEARCH */
  .search-bar {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex; align-items: center; gap: 10px;
  }
  .search-bar input {
    flex: 1; border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 14px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
    outline: none; background: var(--off-white); color: var(--black);
    transition: border-color 0.15s;
  }
  .search-bar input:focus { border-color: var(--gold); }
  .search-bar input::placeholder { color: #bbb; }

  /* BELT FILTER TABS */
  .filter-bar {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    overflow-x: auto; white-space: nowrap;
    padding: 0 16px;
  }
  .filter-tabs { display: inline-flex; gap: 4px; padding: 8px 0; }
  .filter-tab {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 20px; cursor: pointer;
    font-size: 0.72rem; font-weight: 600; border: 1px solid var(--border);
    background: var(--off-white); color: var(--gray); transition: all 0.15s;
    white-space: nowrap; user-select: none;
  }
  .filter-tab:hover { border-color: var(--gold); color: var(--black); }
  .filter-tab.active { background: var(--gold); border-color: var(--gold); color: var(--black); }
  .belt-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* MAIN */
  main { max-width: 860px; margin: 0 auto; padding: 28px 16px 60px; }

  /* SECTION GROUPS */
  .section-group { margin-bottom: 44px; }
  .section-group-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 4px;
    color: var(--gold); text-transform: uppercase; margin-bottom: 14px;
    padding-bottom: 6px; border-bottom: 2px solid var(--gold-light);
    display: flex; align-items: center; gap: 10px;
  }
  .section-group-title .group-line { flex: 1; height: 1px; background: var(--gold-light); }

  /* BELT CARD */
  .belt-card {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 10px; margin-bottom: 12px; overflow: hidden;
    transition: box-shadow 0.2s, border-color 0.2s;
  }
  .belt-card:hover { box-shadow: 0 2px 12px rgba(201,146,10,0.1); border-color: #d4b96a; }
  .belt-card.hidden { display: none; }

  .belt-header {
    display: flex; align-items: center; padding: 14px 18px;
    cursor: pointer; user-select: none; gap: 14px;
    background: var(--white);
  }
  .belt-color-bar { width: 6px; border-radius: 3px; align-self: stretch; flex-shrink: 0; min-height: 36px; }
  .belt-info { flex: 1; }
  .belt-name { font-size: 1rem; font-weight: 700; color: var(--black); }
  .belt-meta { font-size: 0.72rem; color: var(--gray-light); margin-top: 2px; }
  .belt-tags { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .tag {
    font-size: 0.65rem; padding: 2px 8px; border-radius: 10px;
    font-weight: 600; white-space: nowrap;
  }
  .tag-form    { background: var(--gold-bg); color: var(--gold); border: 1px solid #e8d080; }
  .tag-rotate  { background: #f0f8ff; color: #4a7fa5; border: 1px solid #bde0f5; }
  .tag-cycle   { background: #f5f5f5; color: #666; border: 1px solid #ddd; }
  .tag-black   { background: #1a1a1a; color: var(--gold); border: 1px solid #333; }

  .chevron { color: var(--gray-light); font-size: 0.75rem; transition: transform 0.2s; flex-shrink: 0; }
  .belt-card.open .chevron { transform: rotate(180deg); }

  .belt-body { display: none; padding: 16px 18px 20px; border-top: 1px solid var(--border); background: var(--off-white); }
  .belt-card.open .belt-body { display: block; }

  /* CONTENT SECTIONS */
  .content-section { margin-bottom: 18px; }
  .content-section:last-child { margin-bottom: 0; }
  .content-label {
    font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px;
    color: var(--gold); font-weight: 700; margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .content-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .form-block {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 7px; padding: 12px 16px; margin-bottom: 8px;
  }
  .form-block:last-child { margin-bottom: 0; }
  .form-name { font-size: 0.92rem; font-weight: 700; color: var(--black); }
  .form-korean { font-size: 0.78rem; color: var(--gold); font-weight: 600; margin-top: 2px; }
  .form-note { font-size: 0.78rem; color: var(--gray-light); margin-top: 4px; line-height: 1.5; }

  .rotation-block {
    background: #f0f8ff; border: 1px solid #bde0f5;
    border-radius: 7px; padding: 12px 16px; margin-bottom: 8px;
  }
  .rotation-title { font-size: 0.78rem; font-weight: 700; color: #4a7fa5; margin-bottom: 6px; }
  .rotation-item { font-size: 0.82rem; color: var(--black); padding: 3px 0; display: flex; align-items: center; gap: 8px; }
  .rotation-item::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #4a7fa5; flex-shrink: 0; }

  .cycle-info {
    background: var(--gold-bg); border: 1px solid #e8d080;
    border-radius: 7px; padding: 10px 14px; font-size: 0.78rem;
    color: var(--gray); line-height: 1.6;
  }
  .cycle-info strong { color: var(--gold); }

  /* NOTES PLACEHOLDER */
  .placeholder-note {
    font-size: 0.8rem; color: #bbb; font-style: italic;
    padding: 8px 0;
  }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--gray-light); }
  .empty-state .big { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 3px; color: #ccc; display: block; margin-bottom: 8px; }

  /* LEGEND */
  .legend {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 18px; margin-bottom: 28px;
    display: flex; flex-wrap: wrap; gap: 16px; align-items: center;
  }
  .legend-title { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); font-weight: 700; width: 100%; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--gray); }

  /* TECHNIQUES MODAL */
  .tech-modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:300; align-items:flex-end; justify-content:center; padding:0; }
  .tech-modal-overlay.active { display:flex; }
  .tech-modal { background:#fff; border-radius:16px 16px 0 0; width:100%; max-width:600px; max-height:85vh; display:flex; flex-direction:column; animation:slideUp 0.25s ease; }
  .tech-modal-header { padding:16px 20px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .tech-modal-title { font-family:'Bebas Neue',sans-serif; font-size:1.3rem; letter-spacing:2px; color:var(--black); }
  .tech-modal-sub { font-size:0.72rem; color:var(--gold); font-weight:600; margin-top:2px; }
  .tech-modal-close { background:none; border:1px solid #ddd; border-radius:50%; width:28px; height:28px; cursor:pointer; font-size:1rem; color:#888; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .tech-modal-body { overflow-y:auto; padding:16px 20px 28px; }
  .tech-ready { font-size:0.75rem; color:var(--gold); font-weight:700; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:12px; }
  .tech-move { font-size:0.82rem; color:#333; padding:6px 0; border-bottom:1px solid #f5f5f5; line-height:1.5; }
  .tech-move:last-child { border-bottom:none; }
  .tech-num { font-weight:700; color:var(--black); margin-right:4px; }
  .belt-diagram-wrap { margin-bottom: 18px; }
  .belt-diagram-label { font-size:0.65rem; text-transform:uppercase; letter-spacing:2px; color:var(--gold); font-weight:700; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
  .belt-diagram-label::after { content:''; flex:1; height:1px; background:var(--border); }
  .belt-diagram { display:flex; align-items:stretch; height:40px; border-radius:6px; overflow:hidden; border:1px solid rgba(0,0,0,0.15); }
  .belt-main { flex:1; }
  .belt-end-left  { display:flex; align-items:stretch; flex-shrink:0; }
  .belt-end-right { display:flex; align-items:stretch; flex-shrink:0; }
  .belt-stripe { width:18px; height:100%; cursor:pointer; flex-shrink:0; -webkit-tap-highlight-color:transparent; }
  .belt-stripe:hover { opacity:0.75; }
  .belt-stripe-gap { width:3px; background:#f0f0f0; height:100%; flex-shrink:0; }
  .belt-stripe-empty { width:14px; background:transparent; }
  .stripe-detail-panel { background:var(--white); border:1px solid var(--border); border-radius:7px; padding:12px 14px; margin-top:8px; display:none; }
  .stripe-detail-panel.open { display:block; }
  .stripe-detail-title { font-size:0.78rem; font-weight:700; color:var(--black); margin-bottom:8px; }
  .stripe-sub-label { font-size:0.65rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--gold); margin:8px 0 4px; font-weight:700; }
  .stripe-item { font-size:0.8rem; color:#444; padding:2px 0 2px 14px; position:relative; line-height:1.5; }
  .stripe-item::before { content:'·'; position:absolute; left:3px; color:#bbb; }
</style>
</head>
<body>

<!-- ANNOUNCEMENT BANNER -->
<div id="announcementBanner" style="display:none;background:#c9920a;color:white;padding:10px 16px;font-size:0.82rem;line-height:1.5;position:relative;">
  <div id="announcementText" style="padding-right:32px;font-weight:500;"></div>
  <button onclick="document.getElementById('announcementBanner').style.display='none'" style="position:absolute;top:50%;right:12px;transform:translateY(-50%);background:none;border:none;color:white;font-size:1.1rem;cursor:pointer;opacity:0.8;padding:4px;">✕</button>
</div>

<header>
  <div>
    <div class="logo">Bares<span>TKD</span></div>
    <div class="header-sub">Student Curriculum</div>
  </div>
  <button id="adminLockBtn" onclick="toggleAdminLogin()" style="background:none;border:none;font-size:1.1rem;cursor:pointer;opacity:0.35;padding:4px 8px;" title="Admin">🔒</button>
</header>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search belt, form name...">
</div>

<div class="filter-bar">
  <div class="filter-tabs" id="filterTabs"></div>
</div>

<main id="mainContent"></main>

<!-- ADMIN LOGIN MODAL -->
<div id="adminLoginModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:400;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:12px;padding:28px 24px;width:90%;max-width:340px;">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:2px;margin-bottom:16px;color:#111;">Admin Login</div>
    <input id="adminPwInput" type="password" placeholder="Password" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:0.9rem;box-sizing:border-box;margin-bottom:10px;">
    <div id="adminPwError" style="color:#c8102e;font-size:0.75rem;margin-bottom:8px;display:none;">Incorrect password.</div>
    <div style="display:flex;gap:8px;">
      <button onclick="checkAdminPassword()" style="flex:1;padding:10px;background:#c9920a;color:white;border:none;border-radius:6px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;font-size:0.9rem;cursor:pointer;">Login</button>
      <button onclick="document.getElementById('adminLoginModal').style.display='none'" style="padding:10px 14px;background:#f5f5f5;color:#555;border:none;border-radius:6px;cursor:pointer;">Cancel</button>
    </div>
  </div>
</div>

<!-- ADMIN PANEL MODAL -->
<div id="adminPanelModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:400;align-items:flex-end;justify-content:center;">
  <div style="background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:600px;max-height:88vh;display:flex;flex-direction:column;">
    <div style="padding:16px 20px 12px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:2px;color:#111;">⚙ Admin Panel</div>
      <button onclick="document.getElementById('adminPanelModal').style.display='none'" style="background:none;border:1px solid #ddd;border-radius:50%;width:28px;height:28px;cursor:pointer;color:#888;">✕</button>
    </div>
    <div style="overflow-y:auto;padding:16px 20px 32px;" id="adminPanelBody"></div>
  </div>
</div>

<!-- DIAGRAM MODAL -->
<div class="tech-modal-overlay" id="diagModalOverlay" onclick="if(event.target===this)closeDiagModal()">
  <div class="tech-modal">
    <div class="tech-modal-header">
      <div>
        <div class="tech-modal-title" id="diagModalTitle"></div>
        <div class="tech-modal-sub" id="diagModalSub"></div>
      </div>
      <button class="tech-modal-close" onclick="closeDiagModal()">✕</button>
    </div>
    <div class="tech-modal-body" id="diagModalBody" style="padding:12px 16px 20px;"></div>
  </div>
</div>

<!-- TECHNIQUES MODAL -->
<div class="tech-modal-overlay" id="techModalOverlay" onclick="closeTechModal(event)">
  <div class="tech-modal">
    <div class="tech-modal-header">
      <div>
        <div class="tech-modal-title" id="techModalTitle"></div>
        <div class="tech-modal-sub" id="techModalSub"></div>
      </div>
      <button class="tech-modal-close" onclick="document.getElementById('techModalOverlay').classList.remove('active')">✕</button>
    </div>
    <div class="tech-modal-body" id="techModalBody"></div>
  </div>
</div>

function renderRotationTab() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '';

  // Header note
  const header = document.createElement('div');
  header.style.cssText = 'background:#fffbf0;border:1px solid #e8d080;border-left:4px solid #c9920a;border-radius:8px;padding:14px 18px;margin-bottom:28px;';
  header.innerHTML = `
    <div style="font-size:0.65rem;text-transform:uppercase;letter-spacing:2px;color:#c9920a;font-weight:700;margin-bottom:5px;">About the Rotation</div>
    <div style="font-size:0.82rem;color:#555;line-height:1.6;">
      Each cycle is <strong>10 weeks</strong>. One full rotation is <strong>20 weeks (2 cycles)</strong> for Beginner and Advanced groups,
      and <strong>30 weeks (3 cycles)</strong> for Intermediate. All groups train the same class material during a cycle —
      the form rotates together so you only teach one form at a time per group.
    </div>`;
  main.appendChild(header);

  ROTATIONS.forEach(rotation => {
    const block = document.createElement('div');
    block.style.cssText = 'margin-bottom:28px;';

    const statusColor = rotation.status === 'current' ? '#4caf50' : rotation.status === 'upcoming' ? '#c9920a' : '#888';
    const statusBg    = rotation.status === 'current' ? 'rgba(76,175,80,0.1)' : rotation.status === 'upcoming' ? 'rgba(201,146,10,0.1)' : 'rgba(100,100,100,0.08)';
    const statusLabel = rotation.status === 'current' ? '● ACTIVE NOW' : rotation.status === 'upcoming' ? '◎ COMING UP' : '○ FUTURE';

    block.innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid ${statusColor}22;">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:3px;color:${statusColor}">${rotation.label}</div>
        <div style="font-size:0.65rem;font-weight:700;letter-spacing:1.5px;color:${statusColor};background:${statusBg};padding:3px 8px;border-radius:10px;border:1px solid ${statusColor}44">${statusLabel}</div>
        <div style="font-size:0.75rem;color:#888;margin-left:auto">${rotation.dates}</div>
      </div>
      ${rotation.note ? `<div style="font-size:0.75rem;color:#aaa;margin-bottom:12px;font-style:italic">${rotation.note}</div>` : ''}
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;">
        ${rotation.groups.map(g => {
          const c = GROUP_COLORS[g.group] || { bg:'#f5f5f5', border:'#ccc', text:'#555' };
          return `<div style="background:${c.bg};border:1px solid ${c.border};border-radius:8px;padding:14px 16px;">
            <div style="font-size:0.62rem;text-transform:uppercase;letter-spacing:2px;color:${c.text};font-weight:700;margin-bottom:6px">${g.group}</div>
            <div style="font-size:1.1rem;font-weight:700;color:#111">${g.form}</div>
            <div style="font-size:0.8rem;color:${c.text};margin-top:2px;margin-bottom:${g.youtubeUrl?'10px':'0'}">${g.korean}</div>
            ${g.youtubeUrl ? `<a href="${g.youtubeUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="display:inline-flex;align-items:center;gap:5px;background:#ff0000;color:white;border-radius:5px;padding:5px 10px;font-size:0.72rem;font-weight:700;text-decoration:none;">▶ Watch</a>` : ''}
          </div>`;
        }).join('')}
      </div>`;
    main.appendChild(block);
  });
}

  FILTERS.forEach((f,i) => {
    const tab = document.createElement('div');
    tab.className = 'filter-tab' + (i===0?' active':'');
    if (f.special) tab.style.cssText = 'border-color:#c9920a;color:#c9920a;margin-left:8px;padding-left:16px;border-left-width:2px;';
    tab.dataset.value = f.value;
    tab.textContent = f.label;
    tab.onclick = () => applyFilter(f.value, tab);
    container.appendChild(tab);
  });
}

function applyFilter(value, tab) {
  document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  document.querySelector('.search-bar').style.display = 'flex';
  if (value === 'cubs') {
    document.querySelector('.search-bar').style.display = 'none';
    renderCubs();
    return;
  }
  if (value === 'rotation') {
    document.querySelector('.search-bar').style.display = 'none';
    renderRotationInline();
    return;
  }
  if (value === 'events') {
    document.querySelector('.search-bar').style.display = 'none';
    renderEvents();
    return;
  }
  if (value === 'boards') {
    document.querySelector('.search-bar').style.display = 'none';
    renderBoards();
    return;
  }
  const search = document.getElementById('searchInput').value.toLowerCase();
  renderCards(value, search);
}

// ─── RENDER ──────────────────────────────────────────────────
function buildCard(belt, idx) {
  const tagsHtml = belt.tags.filter(t => t.type === 'form').map(t=>`<span class="tag tag-form">${t.label}</span>`).join('');

  let bodyHtml = '';

  if (belt.forms && belt.forms.length > 0) {
    const formLabel = belt.forms.length > 1 ? 'Patterns / Forms' : 'Pattern / Form';
    bodyHtml += `<div class="content-section"><div class="content-label">${formLabel}</div>`;
    belt.forms.forEach(f => {
      const hasTech = `FORM_TECHNIQUES['${f.name}']`;
      bodyHtml += `<div class="form-block">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;">
          <div>
            <div class="form-name">${f.name}</div>
            ${f.korean ? `<div class="form-korean">${f.korean}</div>` : ''}
            ${f.meaning ? `<div class="form-note" style="margin-top:4px;font-style:italic">${f.meaning}</div>` : ''}
            ${f.note ? `<div class="form-note">${f.note}</div>` : ''}
          </div>
          <div style="display:flex;flex-direction:column;gap:5px;flex-shrink:0;">
            ${f.youtubeUrl ? `<a href="${f.youtubeUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="display:inline-flex;align-items:center;gap:4px;background:#ff0000;color:white;border-radius:5px;padding:5px 10px;font-size:0.72rem;font-weight:700;text-decoration:none;white-space:nowrap;">▶ Watch</a>` : ''}
            <button onclick="event.stopPropagation();openTechModal('${f.name}')" style="display:inline-flex;align-items:center;gap:4px;background:var(--gold-bg);color:var(--gold);border:1px solid #e8d080;border-radius:5px;padding:5px 10px;font-size:0.72rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;">📋 Techniques</button>
            <button onclick="event.stopPropagation();openDiagramModal('${f.name}')" style="display:inline-flex;align-items:center;gap:4px;background:#e8edf7;color:var(--blue-mid, #2a5298);border:1px solid #c0cce8;border-radius:5px;padding:5px 10px;font-size:0.72rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;">📐 Diagram</button>
          </div>
        </div>
      </div>`;
    });
    bodyHtml += `</div>`;
  }

  if (belt.rotation) {
    bodyHtml += `<div class="content-section"><div class="content-label">Rotating Schedule</div>
      <div class="rotation-block">
        <div class="form-note" style="margin-bottom:8px">${belt.rotation.description}</div>
        ${belt.rotation.items.map(item => {
          const parts = item.split(' — ');
          const cycleLabel = parts[0];
          const formName = parts[1] || '';
          const meaning = parts.slice(2).join(' — ');
          return `<div class="rotation-item">
            <span style="font-weight:600">${cycleLabel}${formName ? ' — ' + formName : ''}</span>
            ${meaning ? `<div style="font-size:0.75rem;color:#888;font-style:italic;margin-top:2px;margin-left:14px">${meaning}</div>` : ''}
          </div>`;
        }).join('')}
      </div></div>`;
  }

  // BOARDS — brown belt and above
  const brownAndAbove = ['Brown Belt','Senior Brown Belt','Red Belt','Senior Red Belt',
    'Probationary Black Belt','Recommended Black Belt','1st Degree Decided Black Belt',
    '1st Degree Decided Level 2','1st Degree Senior Black Belt','1st Degree Senior Level 2',
    '2nd Degree Black Belt','2nd Degree Black Belt Level 2','2nd Degree Decided Black Belt',
    '2nd Degree Decided Black Belt Level 2','2nd Degree Senior Black Belt','2nd Degree Senior Black Belt Level 2',
    '3rd Degree Black Belt','3rd Degree Decided Black Belt','3rd Degree Senior Black Belt',
    '4th Degree Black Belt','4th Degree Senior Black Belt'];

  // Map belt card names to BOARDS_DATA rank abbreviations
  const boardsMap = {
    'Brown Belt': 'Br. & Sr. Br.', 'Senior Brown Belt': 'Br. & Sr. Br.',
    'Red Belt': 'Red & Sr. Red', 'Senior Red Belt': 'Red & Sr. Red',
    'Probationary Black Belt': '1st Prob.', 'Recommended Black Belt': '1st Rec.',
    '1st Degree Decided Black Belt': '1st Dec.', '1st Degree Decided Level 2': '1st Dec.',
    '1st Degree Senior Black Belt': '1st Sr.', '1st Degree Senior Level 2': '1st Sr. L2',
    '2nd Degree Black Belt': '2nd', '2nd Degree Black Belt Level 2': '2nd L2',
    '2nd Degree Decided Black Belt': '2nd Dec.', '2nd Degree Decided Black Belt Level 2': '2nd Dec. L2',
    '2nd Degree Senior Black Belt': '2nd Sr.', '2nd Degree Senior Black Belt Level 2': '2nd Sr. L2 & up',
  };

  if (brownAndAbove.includes(belt.name)) {
    const abbr = boardsMap[belt.name];
    const boardEntry = abbr ? BOARDS_DATA.ranks.find(r => r.name === abbr) : null;
    if (boardEntry && boardEntry.foot) {
      bodyHtml += `<div class="content-section">
        <div class="content-label">Board Breaking</div>
        <div class="form-block">
          <div style="margin-bottom:12px;">
            <div style="font-size:0.65rem;text-transform:uppercase;letter-spacing:2px;color:#7a4e1e;font-weight:700;border-bottom:1px solid #e8d5c0;padding-bottom:4px;margin-bottom:6px;">Kick</div>
            <div style="font-size:0.88rem;color:var(--black);line-height:1.6;">${boardEntry.foot}</div>
          </div>
          ${boardEntry.hand && boardEntry.hand !== 'None' ? `<div style="margin-bottom:${boardEntry.notes ? '12px' : '0'};">
            <div style="font-size:0.65rem;text-transform:uppercase;letter-spacing:2px;color:#7a4e1e;font-weight:700;border-bottom:1px solid #e8d5c0;padding-bottom:4px;margin-bottom:6px;">Hand Technique</div>
            <div style="font-size:0.88rem;color:var(--black);line-height:1.6;">${boardEntry.hand}</div>
          </div>` : ''}
          ${boardEntry.notes ? `<div style="font-size:0.75rem;color:var(--gray-light);font-style:italic;padding-top:6px;border-top:1px solid #f0ece4">${boardEntry.notes}</div>` : ''}
        </div>
      </div>`;
    } else {
      bodyHtml += `<div class="content-section">
        <div class="content-label">Board Breaking</div>
        <div class="placeholder-note">See the 🪵 Boards tab for full requirements.</div>
      </div>`;
    }
  }

  // STRIPES
  if (belt.stripes) {
    const beltColor = belt.color;
    const borderCol = (beltColor === '#f0f0f0' || beltColor === '#f5c518') ? '#ccc' : 'transparent';
    const blackStripes = belt.stripes.black || [];
    const coloredStripes = belt.stripes.colored || [];

    // Same-color stripe: use a contrasting opaque color
    const sameColorMap = {
      '#f5c518': '#b8860b', // yellow belt -> dark yellow
      '#f5830a': '#c96200', // orange belt -> slightly darker orange
      '#e87722': '#c96200', // orange belt alt key
      '#3a9e3a': '#1a5c1a', // green belt -> dark green
      '#8b3fa8': '#5a1a7a', // purple belt -> dark purple
      '#2a6fdb': '#1a3a8a', // blue belt -> dark blue
      '#7a4e1e': '#3d2200', // brown belt -> dark brown
      '#c8102e': '#7a0018', // red belt -> dark red
    };
    function contrastStripe(sc, bc) {
      if (sc.toLowerCase() === bc.toLowerCase()) return sameColorMap[bc.toLowerCase()] || '#333';
      return sc;
    }

    const isSeniorBelt = belt.name.startsWith('Senior');
    // Gap for senior: belt color bg with black stripe through middle via gradient
    const gapBg = isSeniorBelt
      ? 'linear-gradient(to bottom, ' + beltColor + ' 30%, #111 30%, #111 70%, ' + beltColor + ' 70%)'
      : beltColor;
    // Belt body bg
    const beltBg = isSeniorBelt
      ? 'linear-gradient(to bottom, ' + beltColor + ' 30%, #111 30%, #111 70%, ' + beltColor + ' 70%)'
      : beltColor;

    let leftHtml = '';
    blackStripes.forEach((s, si) => {
      const sid = 'stripe-b-' + idx + '-' + si;
      const stripeColor = s.color || '#222';
      if (si > 0) leftHtml += '<div style="width:3px;flex-shrink:0;background:' + gapBg + ';height:100%"></div>';
      leftHtml += '<div class="belt-stripe" style="background:' + stripeColor + ';width:16px;height:100%" title="' + s.label + '" onclick="toggleStripe(\'' + sid + '\')"></div>';
    });

    let rightHtml = '';
    coloredStripes.forEach((s, si) => {
      const sid = 'stripe-c-' + idx + '-' + si;
      const sc = contrastStripe(s.color, beltColor);
      if (si > 0) rightHtml += '<div style="width:3px;flex-shrink:0;background:' + gapBg + ';height:100%"></div>';
      rightHtml += '<div class="belt-stripe" style="background:' + sc + ';width:16px;height:100%" title="' + s.label + '" onclick="toggleStripe(\'' + sid + '\')"></div>';
    });

    const leftWidth = blackStripes.length * 16 + Math.max(0, blackStripes.length - 1) * 3 + 8;
    const rightWidth = coloredStripes.length * 16 + Math.max(0, coloredStripes.length - 1) * 3 + 8;

    bodyHtml += '<div class="belt-diagram-wrap">'
      + '<div class="belt-diagram-label">Stripes <span style="font-size:0.6rem;color:#aaa;letter-spacing:0;text-transform:none;font-weight:400">— tap a stripe to see details</span></div>'
      + '<div class="belt-diagram" style="border:1px solid ' + borderCol + ';overflow:hidden">'
      + '<div style="width:' + leftWidth + 'px;padding:0 4px;display:flex;align-items:stretch;flex-shrink:0;background:' + beltBg + '">' + leftHtml + '</div>'
      + '<div style="flex:1;background:' + beltBg + '"></div>'
      + '<div style="width:' + rightWidth + 'px;padding:0 4px;display:flex;align-items:stretch;flex-shrink:0;background:' + beltBg + '">' + rightHtml + '</div>'
      + '</div>';

      + '<div class="belt-diagram-label">Stripes <span style="font-size:0.6rem;color:#aaa;letter-spacing:0;text-transform:none;font-weight:400">— tap a stripe to see details</span></div>'
      + '<div class="belt-diagram" style="border:1px solid ' + borderCol + '">'
      + '<div style="width:' + leftWidth + 'px;padding:0 4px;display:flex;align-items:stretch;flex-shrink:0;background:' + beltBg + '">' + leftHtml + '</div>'
      + '<div style="flex:1;background:' + beltBg + '"></div>'
      + '<div style="width:' + rightWidth + 'px;padding:0 4px;display:flex;align-items:stretch;flex-shrink:0;background:' + beltBg + '">' + rightHtml + '</div>'
      + '</div>';


    // Black stripe detail panels
    blackStripes.forEach((s, si) => {
      const sid = `stripe-b-${idx}-${si}`;
      bodyHtml += `<div class="stripe-detail-panel" id="${sid}">
        <div class="stripe-detail-title">${s.label}</div>
        ${s.details.map(d => `
          ${d.title ? `<div class="stripe-sub-label">${d.title}</div>` : ''}
          ${d.items.map(item => `<div class="stripe-item">${item}</div>`).join('')}
        `).join('')}
      </div>`;
    });

    // Colored stripe detail panels
    coloredStripes.forEach((s, si) => {
      const sid = `stripe-c-${idx}-${si}`;
      const rotateNote = s.rotate ? `<div style="font-size:0.68rem;color:#aaa;font-style:italic;margin-bottom:6px;">🔄 ${s.label.includes('Kick') || s.label.includes('Breaking') ? 'Rotates with form (every rotation)' : 'Rotates every cycle'}</div>` : '';
      bodyHtml += `<div class="stripe-detail-panel" id="${sid}">
        <div class="stripe-detail-title" style="color:${s.color}">${s.label}</div>
        ${rotateNote}
        ${s.details.map(d => `
          ${d.title ? `<div class="stripe-sub-label">${d.title}</div>` : ''}
          ${d.items.map(item => `<div class="stripe-item">${item}</div>`).join('')}
        `).join('')}
      </div>`;
    });

    bodyHtml += `</div>`;
  }

  return `<div class="belt-card" id="belt-${idx}" data-group="${belt.group}" data-name="${belt.name.toLowerCase()}">
    <div class="belt-header" onclick="toggleBelt(${idx})">
      <div style="display:flex;flex-direction:column;flex:1;gap:6px;">
        <div style="display:flex;align-items:center;gap:10px;">
          ${beltVisual(belt)}
          <div class="belt-name">${belt.name}</div>
          <span class="chevron" style="margin-left:auto">▼</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <div class="belt-meta">${belt.meta}</div>
          ${tagsHtml ? `<div class="belt-tags">${tagsHtml}</div>` : ''}
        </div>
      </div>
    </div>
    <div class="belt-body">${bodyHtml}</div>
  </div>`;
}

function beltVisual(belt) {
  const n = belt.name;
  const c = belt.color;

  // Probationary — black with white center stripe
  if (n === 'Probationary Black Belt') {
    return `<div style="width:28px;height:44px;border-radius:3px;background:#111;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1px solid #333">
      <div style="width:100%;height:5px;background:#e8e8e8"></div>
    </div>`;
  }
  // Recommended — black with red center stripe
  if (n === 'Recommended Black Belt') {
    return `<div style="width:28px;height:44px;border-radius:3px;background:#111;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1px solid #333">
      <div style="width:100%;height:5px;background:#c8102e"></div>
    </div>`;
  }

  // Black belts with gold bars by degree
  let bars = 0;
  if (n.startsWith('1st')) bars = 1;
  else if (n.startsWith('2nd')) bars = 2;
  else if (n.startsWith('3rd')) bars = 3;
  else if (n.startsWith('4th')) bars = 4;

  if (bars > 0) {
    const gap = Math.floor(44 / (bars + 1));
    const barEls = Array.from({length: bars}, (_,i) =>
      `<div style="position:absolute;top:${gap*(i+1)-2}px;left:0;right:0;height:4px;background:#c9920a"></div>`
    ).join('');
    return `<div style="width:28px;height:44px;border-radius:3px;background:#111;flex-shrink:0;position:relative;border:1px solid #333;overflow:hidden">
      ${barEls}
    </div>`;
  }

  // Senior color belts — belt color with black center stripe
  const isSenior = n.startsWith('Senior');
  const borderColor = c === '#e0e0e0' ? '#bbb' : 'transparent';
  if (isSenior) {
    return `<div style="width:28px;height:44px;border-radius:3px;background:${c};flex-shrink:0;position:relative;border:1px solid ${borderColor};overflow:hidden">
      <div style="position:absolute;top:50%;left:0;right:0;height:10px;transform:translateY(-50%);background:#111"></div>
    </div>`;
  }

  // Regular color belts — plain rectangle
  return `<div style="width:28px;height:44px;border-radius:3px;background:${c};flex-shrink:0;border:1px solid ${borderColor}"></div>`;
}

function renderCards(filter='all', search='') {
  const main = document.getElementById('mainContent');
  main.innerHTML = '';
  let anyVisible = false;

  const colorGroups = ['Beginner','Intermediate','Advanced'];
  const groupsToShow = filter === 'all' ? GROUPS : filter === 'color' ? colorGroups : [filter];

  // If showing all or color, wrap color belt groups under one "Color Belts" heading
  const showColorHeader = (filter === 'all' || filter === 'color');

  if (showColorHeader) {
    const colorBelts = colorGroups.map(group =>
      BELTS.map((b,i)=>({...b,idx:i})).filter(b => {
        if (b.group !== group) return false;
        if (search && !b.name.toLowerCase().includes(search) &&
            !b.tags.some(t=>t.label.toLowerCase().includes(search)) &&
            !(b.forms||[]).some(f=>f.name.toLowerCase().includes(search))) return false;
        return true;
      })
    ).filter(g => g.length > 0);

    if (colorBelts.length > 0) {
      anyVisible = true;
      const section = document.createElement('div');
      section.className = 'section-group';
      let html = `<div class="section-group-title">Color Belts<div class="group-line"></div></div>`;
      colorGroups.forEach(group => {
        const belts = BELTS.map((b,i)=>({...b,idx:i})).filter(b => {
          if (b.group !== group) return false;
          if (search && !b.name.toLowerCase().includes(search) &&
              !b.tags.some(t=>t.label.toLowerCase().includes(search)) &&
              !(b.forms||[]).some(f=>f.name.toLowerCase().includes(search))) return false;
          return true;
        });
        if (belts.length === 0) return;
        html += `<div style="font-size:0.68rem;text-transform:uppercase;letter-spacing:2px;color:#aaa;font-weight:600;margin:18px 0 8px;padding-left:2px">${group}</div>`;
        html += belts.map(b => buildCard(b, b.idx)).join('');
      });
      section.innerHTML = html;
      main.appendChild(section);
    }

    // Now handle Black Belt separately if showing all
    if (filter === 'all') {
      const bbBelts = BELTS.map((b,i)=>({...b,idx:i})).filter(b => {
        if (b.group !== 'Black Belt') return false;
        if (search && !b.name.toLowerCase().includes(search) &&
            !b.tags.some(t=>t.label.toLowerCase().includes(search)) &&
            !(b.forms||[]).some(f=>f.name.toLowerCase().includes(search))) return false;
        return true;
      });
      if (bbBelts.length > 0) {
        anyVisible = true;
        const section = document.createElement('div');
        section.className = 'section-group';
        section.innerHTML = `<div class="section-group-title">Black Belt<div class="group-line"></div></div>` +
          bbBelts.map(b => buildCard(b, b.idx)).join('');
        main.appendChild(section);
      }
    }
  } else {
    // Black Belt filter only
    const belts = BELTS.map((b,i)=>({...b,idx:i})).filter(b => {
      if (b.group !== 'Black Belt') return false;
      if (search && !b.name.toLowerCase().includes(search) &&
          !b.tags.some(t=>t.label.toLowerCase().includes(search)) &&
          !(b.forms||[]).some(f=>f.name.toLowerCase().includes(search))) return false;
      return true;
    });
    if (belts.length > 0) {
      anyVisible = true;
      const section = document.createElement('div');
      section.className = 'section-group';
      section.innerHTML = `<div class="section-group-title">Black Belt<div class="group-line"></div></div>` +
        belts.map(b => buildCard(b, b.idx)).join('');
      main.appendChild(section);
    }
  }

  if (!anyVisible) {
    main.innerHTML = `<div class="empty-state"><span class="big">NO RESULTS</span>Try a different search or filter.</div>`;
  }
}

function toggleBelt(idx) {
  document.getElementById(`belt-${idx}`).classList.toggle('open');
}

function toggleStripe(id) {
  const panel = document.getElementById(id);
  if (!panel) return;
  // Close all other panels in same card first
  const allPanels = panel.closest('.belt-diagram-wrap').querySelectorAll('.stripe-detail-panel');
  allPanels.forEach(p => { if (p.id !== id) p.classList.remove('open'); });
  panel.classList.toggle('open');
}

function renderBoards() {
  var main = document.getElementById('mainContent');
  var html = '';

  // INTRO
  html += '<div style="background:#fffbf0;border:1px solid #e8d080;border-left:4px solid #c9920a;border-radius:8px;padding:14px 18px;margin-bottom:24px;font-size:0.82rem;color:#555;line-height:1.6;">Board breaking begins at <strong>Brown Belt</strong>. Board sizes are determined by age and rank group.</div>';

  // BOARD SIZE TABLE
  html += '<div style="font-family:Bebas Neue,sans-serif;font-size:1rem;letter-spacing:3px;color:#c9920a;margin-bottom:10px;">Board Size by Age</div>';
  html += '<div style="background:#fff;border:1px solid #e8e0cc;border-radius:8px;overflow:hidden;margin-bottom:12px;">';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;background:#f8f4ec;border-bottom:2px solid #e8d080;">'
    + '<div style="padding:8px 12px;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#c9920a">Age</div>'
    + '<div style="padding:8px 12px;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#7a4e1e">Brown & Red</div>'
    + '<div style="padding:8px 12px;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#111">Black Belt</div>'
    + '</div>';
  BOARDS_DATA.sizes.forEach(function(row, i) {
    var bg = i % 2 === 0 ? '#fff' : '#fafafa';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;background:' + bg + ';border-bottom:1px solid #f0ece4;">'
      + '<div style="padding:9px 12px;font-size:0.82rem;color:#444">' + row.age + '</div>'
      + '<div style="padding:9px 12px;font-size:0.88rem;font-weight:600;color:#7a4e1e">' + row.brownRed + '</div>'
      + '<div style="padding:9px 12px;font-size:0.88rem;font-weight:600;color:#111">' + row.black + '</div>'
      + '</div>';
  });
  html += '</div>';

  // SIZE NOTES
  html += '<div style="background:#f5f5f5;border:1px solid #e0e0e0;border-radius:6px;padding:10px 14px;margin-bottom:24px;">';
  BOARDS_DATA.sizeNotes.forEach(function(note) {
    html += '<div style="font-size:0.75rem;color:#666;padding:2px 0">' + note + '</div>';
  });
  html += '</div>';

  // RANK TIME & BOARD REQUIREMENTS TABLE
  html += '<div style="font-family:Bebas Neue,sans-serif;font-size:1rem;letter-spacing:3px;color:#c9920a;margin-bottom:10px;">Rank Time & Board Requirements</div>';
  html += '<div style="background:#fff;border:1px solid #e8e0cc;border-radius:8px;overflow:hidden;margin-bottom:12px;">';

  // Header
  html += '<div style="display:grid;grid-template-columns:120px 1fr 1fr;background:#f8f4ec;border-bottom:2px solid #e8d080;">'
    + '<div style="padding:8px 12px;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#c9920a">Rank</div>'
    + '<div style="padding:8px 12px;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#888">Foot</div>'
    + '<div style="padding:8px 12px;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#888">Hand / Notes</div>'
    + '</div>';

  BOARDS_DATA.ranks.forEach(function(rank, i) {
    var bg = i % 2 === 0 ? '#fff' : '#fafafa';
    var hasBoards = rank.foot !== '';
    if (!hasBoards) return; // skip ranks with no board requirements
    html += '<div style="display:grid;grid-template-columns:120px 1fr 1fr;background:' + bg + ';border-bottom:1px solid #f0ece4;align-items:start;">'
      + '<div style="padding:9px 12px;font-size:0.82rem;font-weight:600;color:#111">' + rank.name + '</div>'
      + '<div style="padding:9px 12px;font-size:0.78rem;color:#111">' + rank.foot + '</div>'
      + '<div style="padding:9px 12px;font-size:0.75rem;color:#666">'
        + (rank.hand ? '<span style="font-weight:600">' + rank.hand + '</span>' : '')
        + (rank.notes ? '<div style="color:#999;font-style:italic;font-size:0.68rem;margin-top:2px">' + rank.notes + '</div>' : '')
      + '</div>'
      + '</div>';
  });
  html += '</div>';

  // RANK NOTES
  html += '<div style="background:#f5f5f5;border:1px solid #e0e0e0;border-radius:6px;padding:10px 14px;">';
  BOARDS_DATA.rankNotes.forEach(function(note) {
    html += '<div style="font-size:0.75rem;color:#666;padding:2px 0">' + note + '</div>';
  });
  html += '</div>';

  main.innerHTML = html;
}

function openTechModal(formName) {
  var data = FORM_TECHNIQUES[formName];
  var overlay = document.getElementById('techModalOverlay');
  var title = document.getElementById('techModalTitle');
  var sub = document.getElementById('techModalSub');
  var body = document.getElementById('techModalBody');

  title.textContent = formName;

  if (!data) {
    sub.textContent = 'Techniques coming soon';
    body.innerHTML = '<div style="color:#aaa;font-style:italic;padding:20px 0">Technique list not yet available for this form.</div>';
    overlay.classList.add('active');
    return;
  }

  sub.textContent = data.ready + ' · ' + data.moves.length + ' movements';
  body.innerHTML = data.moves.map(function(m) {
    var parts = m.match(/^(\d+)\.\s(.+)$/);
    if (parts) return '<div class="tech-move"><span class="tech-num">' + parts[1] + '.</span>' + parts[2] + '</div>';
    return '<div class="tech-move">' + m + '</div>';
  }).join('');
  overlay.classList.add('active');
}

function closeTechModal(e) {
  if (e.target === document.getElementById('techModalOverlay')) {
    document.getElementById('techModalOverlay').classList.remove('active');
  }
}

async function addAnnouncement() {
  var text = document.getElementById('newAnnoText').value.trim();
  if (!text) return;
  await sb.from('announcements').insert({ text: text, active: true });
  loadAnnouncements();
  openAdminPanel();
}

async function toggleAnnouncement(id, active) {
  await sb.from('announcements').update({ active: active }).eq('id', id);
  loadAnnouncements();
}

async function deleteAnnouncement(id) {
  if (!confirm('Delete this announcement?')) return;
  await sb.from('announcements').delete().eq('id', id);
  loadAnnouncements();
  openAdminPanel();
}

async function addEvent() {
  var label = document.getElementById('newEvLabel').value.trim();
  var date = document.getElementById('newEvDate').value.trim();
  if (!label || !date) { alert('Event name and date are required.'); return; }
  await sb.from('events').insert({
    label: label,
    date: date,
    category: document.getElementById('newEvCat').value.trim() || 'General',
    note: document.getElementById('newEvNote').value.trim(),
    link: document.getElementById('newEvLink').value.trim(),
    link_label: document.getElementById('newEvLinkLabel').value.trim(),
    sort_order: 999
  });
  openAdminPanel();
  renderEvents();
}

async function deleteEvent(id) {
  if (!confirm('Delete this event?')) return;
  await sb.from('events').delete().eq('id', id);
  openAdminPanel();
  renderEvents();
}

var _diagCur = -1;
var _diagCanvas, _diagCtx, _diagW, _diagH;

var KIBON_MOVES = [
  { label:'JB', desc:'Jun-Bi',                        stance:'Ready Stance A',       junbi:true },
  { label:'1',  desc:'Left Low Block',                 stance:'Left Front Stance' },
  { label:'2',  desc:'Right Punch Middle',             stance:'Right Front Stance' },
  { label:'3',  desc:'Right Low Block',                stance:'Right Front Stance' },
  { label:'4',  desc:'Left Punch Middle',              stance:'Left Front Stance' },
  { label:'5',  desc:'Left Inner Forearm Block',       stance:'Left Back Stance' },
  { label:'6',  desc:'Right Punch Middle',             stance:'Right Front Stance' },
  { label:'7',  desc:'Left High Block',                stance:'Left Front Stance' },
  { label:'8',  desc:'Right Reverse Punch Middle (Yell)', stance:'Left Front Stance' },
  { label:'9',  desc:'Right Inner Forearm Block',      stance:'Right Back Stance' },
  { label:'10', desc:'Left Punch Middle',              stance:'Left Front Stance' },
  { label:'11', desc:'Right High Block',               stance:'Right Front Stance' },
  { label:'12', desc:'Left Reverse Punch Middle (Yell)', stance:'Right Front Stance' },
  { label:'13', desc:'Left Knifehand Strike Middle',   stance:'Sitting Stance' },
  { label:'14', desc:'Right Knifehand Strike Middle',  stance:'Sitting Stance' },
];

function diagPts(W, H) {
  var cx    = W * 0.50;
  var barY  = H * 0.85;
  var topY  = H * 0.12;

  var farL=W*0.12, closL=W*0.30, closR=W*0.70, farR=W*0.88;
  var midL = closL - W*0.04;  // slightly inside close left
  var midR = closR + W*0.04;  // slightly inside close right

  var stemLen = barY - topY;
  var top    = topY;               // 7, 8
  var arcBot = topY + H*0.15;     // 9 — bottom of turn arc
  var p10    = topY + stemLen*0.55; // 10 — well down the stem
  var bot    = barY - H*0.02;     // 11, 12 — bottom of stem
  var p5     = barY - stemLen*0.35; // 5 — just above middle
  var p6     = barY - stemLen*0.65; // 6 — between 5 and top

  return [
    { x:cx,    y:barY },       // JB
    { x:closL, y:barY },       // 1
    { x:farL,  y:barY },       // 2
    { x:closR, y:barY },       // 3
    { x:farR,  y:barY },       // 4
    { x:cx,    y:p5 },         // 5
    { x:cx,    y:p6 },         // 6
    { x:cx,    y:top },        // 7
    { x:cx,    y:top },        // 8 same as 7
    { x:cx,    y:arcBot },     // 9
    { x:cx,    y:p10 },        // 10
    { x:cx,    y:bot },        // 11
    { x:cx,    y:bot },        // 12 same as 11
    { x:midL,  y:barY },       // 13 middle of left bar
    { x:midR,  y:barY },       // 14 middle of right bar
  ];
}

function diagInit() {
  _diagCanvas = document.getElementById('diagCanvas');
  if (!_diagCanvas) return;
  _diagCtx = _diagCanvas.getContext('2d');
  _diagW = _diagCanvas.width = _diagCanvas.offsetWidth;
  _diagH = _diagCanvas.height = _diagCanvas.offsetHeight;
  _diagCur = -1;
  _diagForm = document.getElementById('diagModalTitle').textContent;
  diagDrawBase();
  diagUpdateButtons();
}

var _diagForm = 'Ki-Bon';

function diagDrawBase() {
  if (_diagForm === 'Dan-Gun') { danggunDrawBase(_diagCtx, _diagW, _diagH); return; }
  if (_diagForm === 'Do-San') { dosanDrawBase(_diagCtx, _diagW, _diagH); return; }
  if (_diagForm === 'Won-Hyo') { wonhyoDrawBase(_diagCtx, _diagW, _diagH); return; }
  var ctx = _diagCtx, W = _diagW, H = _diagH;
  ctx.clearRect(0, 0, W, H);
  var pts = diagPts(W, H);
  var cx    = W * 0.50;
  var barY  = H * 0.85;
  var topY  = H * 0.12;
  var arcBot = topY + H*0.15;

  ctx.strokeStyle = 'rgba(26,58,107,0.1)';
  ctx.lineWidth = 4; ctx.lineCap = 'round';
  ctx.setLineDash([8,6]);
  // Bottom bar
  ctx.beginPath(); ctx.moveTo(pts[2].x, pts[2].y); ctx.lineTo(pts[4].x, pts[4].y); ctx.stroke();
  // Stem
  ctx.beginPath(); ctx.moveTo(cx, barY); ctx.lineTo(cx, topY); ctx.stroke();
  ctx.setLineDash([]);

  // Turn arc 8→9
  var arcCY = (topY + arcBot) / 2;
  var arcR  = (arcBot - topY) / 2;
  ctx.save();
  ctx.strokeStyle = 'rgba(200,16,46,0.6)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx, arcCY, arcR, -Math.PI/2, Math.PI/2, false); ctx.stroke();
  ctx.font = '600 9px DM Sans'; ctx.fillStyle = 'rgba(200,16,46,0.7)';
  ctx.textAlign = 'left'; ctx.fillText('8\u21929', cx + arcR + 5, arcCY + 4);
  ctx.restore();

  // Front label
  ctx.font = '600 11px DM Sans'; ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.textAlign = 'center'; ctx.fillText('\u2191 Front', W*0.5, H*0.04);
}

function diagDrawDot(idx) {
  var ctx = _diagCtx, W = _diagW, H = _diagH;
  var moves = _diagForm === 'Dan-Gun' ? DANGGUN_MOVES : (_diagForm === 'Do-San' ? DOSAN_MOVES : (_diagForm === 'Won-Hyo' ? WONHYO_MOVES : KIBON_MOVES));
  var pts   = _diagForm === 'Dan-Gun' ? danggunPts(W, H) : (_diagForm === 'Do-San' ? dosanPts(W, H) : (_diagForm === 'Won-Hyo' ? wonhyoPts(W, H) : diagPts(W, H)));
  var p = pts[idx], m = moves[idx];
  var isJunbi = m.junbi;

  ctx.beginPath();
  ctx.arc(p.x, p.y, 16, 0, Math.PI*2);
  ctx.fillStyle = isJunbi ? '#1a3a6b' : '#c8102e';
  ctx.fill(); ctx.strokeStyle = 'white'; ctx.lineWidth = 2.5; ctx.stroke();

  ctx.font = 'bold ' + (m.label.length > 2 ? '9' : '12') + 'px DM Sans';
  ctx.fillStyle = 'white'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(m.label, p.x, p.y); ctx.textBaseline = 'alphabetic';

  var total = moves.length - 1;
  document.getElementById('diagInfo').innerHTML = isJunbi
    ? '<div style="font-size:0.62rem;text-transform:uppercase;letter-spacing:2px;color:#1a3a6b;font-weight:700;margin-bottom:3px;">Starting Position</div><div style="font-size:0.88rem;font-weight:600;color:#1a3a6b;">Jun-Bi</div><div style="font-size:0.73rem;color:#888;margin-top:2px;">Ready Stance A</div>'
    : '<div style="font-size:0.62rem;text-transform:uppercase;letter-spacing:2px;color:#c8102e;font-weight:700;margin-bottom:3px;">Move ' + m.label + ' of ' + total + '</div><div style="font-size:0.88rem;font-weight:600;color:#1a3a6b;">' + m.desc + '</div><div style="font-size:0.73rem;color:#888;margin-top:2px;">' + m.stance + (m.turnNote ? ' &nbsp;·&nbsp; <span style=\'color:#c8102e;font-weight:600;\'>' + m.turnNote + '</span>' : '') + '</div>';

function diagUpdateButtons() {
  var moves = _diagForm === 'Dan-Gun' ? DANGGUN_MOVES : (_diagForm === 'Do-San' ? DOSAN_MOVES : (_diagForm === 'Won-Hyo' ? WONHYO_MOVES : KIBON_MOVES));
  var total = moves.length;
  var prev = document.getElementById('dPrev');
  var next = document.getElementById('dNext');
  if (!prev || !next) return;
  prev.disabled = _diagCur <= 0;
  next.disabled = _diagCur >= total - 1;
  next.textContent = _diagCur >= total - 1 ? 'Done \u2713' : 'Next \u2192';
}

function diagNext() {
  var moves = _diagForm === 'Dan-Gun' ? DANGGUN_MOVES : (_diagForm === 'Do-San' ? DOSAN_MOVES : (_diagForm === 'Won-Hyo' ? WONHYO_MOVES : KIBON_MOVES));
  if (_diagCur >= moves.length - 1) return;
  _diagCur++;
  diagDrawBase(); diagDrawDot(_diagCur); diagUpdateButtons();
}
function diagPrev() {
  if (_diagCur <= 0) return;
  _diagCur--;
  diagDrawBase(); diagDrawDot(_diagCur); diagUpdateButtons();
}
function diagReset() {
  _diagCur = -1;
  diagDrawBase();
  document.getElementById('diagInfo').innerHTML = '<div style="font-size:0.72rem;color:#aaa;font-style:italic;">Tap Next to step through ' + _diagForm + ' move by move.</div>';
  diagUpdateButtons();
}

function danggunPts(W, H) {
  var cx = W*0.50;
  var barBotY = H*0.88;
  var barTopY = H*0.08;
  var stemBot = H*0.78;
  var stemTop = H*0.18;
  var farL=W*0.25, closL=W*0.37, closR=W*0.63, farR=W*0.75;

  // stem positions going up (5-8)
  var s1=stemBot, s4=stemTop;
  // Space 5,6,7 evenly between stemBot and barTopY (where 8 lives)
  var gap = (stemBot - barTopY) / 3;
  var s2 = stemBot - gap;
  var s3 = stemBot - gap*2;

  return [
    { x:cx,    y:barBotY },         // JB - center of bottom bar
    { x:closL, y:barBotY },         // 1
    { x:farL,  y:barBotY },         // 2
    { x:closR, y:barBotY },         // 3
    { x:farR,  y:barBotY },         // 4
    { x:cx,    y:s1-(s1-s4)*0.15 }, // 5 — moved up
    { x:cx,    y:s2 },              // 6
    { x:cx,    y:s3 },              // 7
    { x:cx,    y:barTopY },         // 8 - center of top bar
    { x:closR, y:barTopY },         // 9 - close right top bar (3/4 turn from 8)
    { x:farR,  y:barTopY },         // 10 - far right top bar
    { x:closL, y:barTopY },         // 11 - close left top bar
    { x:farL,  y:barTopY },         // 12 - far left top bar
    { x:cx,    y:barTopY+28 },      // 13 - just below 8
    { x:cx,    y:barTopY+28 },      // 14 - same spot as 13
    { x:cx,    y:s3+(s2-s3)*0.5 }, // 15 — between s3 and s2
    { x:cx,    y:s2+(s1-s2)*0.5 }, // 16 — between s2 and s1
    { x:cx,    y:barBotY },         // 17 - center of bottom bar (3/4 turn to 18)
    { x:closL, y:barBotY },         // 18 - mirrors 1
    { x:farL,  y:barBotY },         // 19 - mirrors 2
    { x:closR, y:barBotY },         // 20 - mirrors 3
    { x:farR,  y:barBotY },         // 21 - mirrors 4
  ];
}

function danggunDrawBase(ctx, W, H) {
  ctx.clearRect(0, 0, W, H);
  var pts = danggunPts(W, H);
  var cx = W*0.50;
  var barBotY = H*0.88, barTopY = H*0.08;
  var stemBot = H*0.78, stemTop = H*0.18;

  ctx.strokeStyle = 'rgba(26,58,107,0.1)';
  ctx.lineWidth = 4; ctx.lineCap = 'round';
  ctx.setLineDash([8,6]);

  // Bottom bar
  ctx.beginPath(); ctx.moveTo(pts[2].x, pts[2].y); ctx.lineTo(pts[4].x, pts[4].y); ctx.stroke();
  // Stem — connect from bottom bar center to top bar center
  ctx.beginPath(); ctx.moveTo(pts[17].x, pts[17].y); ctx.lineTo(pts[8].x, pts[8].y); ctx.stroke();
  // Top bar — same width as bottom
  var farL=W*0.22, farR=W*0.78;
  ctx.beginPath(); ctx.moveTo(farL, barTopY); ctx.lineTo(farR, barTopY); ctx.stroke();
  ctx.setLineDash([]);

  // Front label
  ctx.font = '600 11px DM Sans'; ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.textAlign = 'center'; ctx.fillText('↑ Front', W*0.5, H*0.04);
}

function dosanPts(W, H) {
  var cx      = W * 0.50;
  var barBotY = H * 0.90;
  var barTopY = H * 0.06;
  var stemBot = H * 0.82;
  var stemTop = H * 0.14;

  // bottom bar — pulled in
  var farL=W*0.22, closL=W*0.37, closR=W*0.63, farR=W*0.78;

  // stem spacing going up — evenly from stemBot to barTopY
  var gap = (stemBot - barTopY) / 4;
  var s1 = stemBot - gap*0.5;   // 5 — higher
  var s2 = stemBot - gap*1.5;   // 6
  var s3 = stemBot - gap*2.5;   // 7 — closer to 8

  // top bar — same width as bottom bar
  var tMidR = W*0.63; // right end of top bar = 9/10 (matches closR)
  var tMidL = W*0.37; // left end of top bar = 11/12 (matches closL)

  // 13 on stem just below top bar — X/bowtie spreads from here
  var p13y   = barTopY + H*0.07;
  var wingW  = tMidR - cx;        // tips reach bar edges
  var wingH  = wingW * 0.9;       // height of each diagonal
  // Right diagonal: 13 → down-right → 15/16
  var p14x   = cx + wingW * 0.5;
  var p14y   = p13y + wingH * 0.5;
  var p1516x = cx + wingW;
  var p1516y = p13y + wingH;
  // Left diagonal: 13 → down-left → 19/20
  var p18x   = cx - wingW * 0.5;
  var p18y   = p13y + wingH * 0.5;
  var p1920x = cx - wingW;
  var p1920y = p13y + wingH;
  // 17 back on stem, 2 notches below 13 — start of left diagonal
  var p17y   = p13y + wingH + H*0.08;
  // Left diagonal from 17: same angle as right, going down-left
  var p18x   = cx - wingW * 0.5;
  var p18y   = p17y + wingH * 0.5;
  var p1920x = cx - wingW;
  var p1920y = p17y + wingH;
  // 21 and 22 continue down stem
  var p21y   = p17y + H*0.09;
  var p22y   = stemBot;

  return [
    { x:cx,      y:barBotY },      // JB
    { x:closL,   y:barBotY },      // 1
    { x:closL,   y:barBotY },      // 2 same as 1
    { x:closR,   y:barBotY },      // 3
    { x:closR,   y:barBotY },      // 4 same as 3
    { x:cx,      y:s1 },           // 5
    { x:cx,      y:s2 },           // 6
    { x:cx,      y:s3 },           // 7
    { x:cx,      y:barTopY },      // 8 center of top bar
    { x:tMidR,   y:barTopY },      // 9
    { x:tMidR,   y:barTopY },      // 10 same as 9
    { x:tMidL,   y:barTopY },      // 11
    { x:tMidL,   y:barTopY },      // 12 same as 11
    { x:cx,      y:p13y },         // 13 on center stem below top bar
    { x:p14x,    y:p14y },         // 14
    { x:p1516x,  y:p1516y },       // 15
    { x:p1516x,  y:p1516y },       // 16 same as 15
    { x:cx,      y:p17y },         // 17 back to center stem
    { x:p18x,    y:p18y },         // 18 mirrors 14
    { x:p1920x,  y:p1920y },       // 19
    { x:p1920x,  y:p1920y },       // 20 same as 19
    { x:cx,      y:H*0.65 },         // 21 slightly lower
    { x:cx,      y:H*0.88 },         // 22 at bar intersection
    { x:W*0.37,  y:H*0.90 },         // 23 closL of bottom bar
    { x:closR,   y:barBotY },        // 24 stays
  ];
}

function dosanDrawBase(ctx, W, H) {
  ctx.clearRect(0, 0, W, H);

}
